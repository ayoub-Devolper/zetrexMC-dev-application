# ==============================
#   Profile Menu - DeluxeMenus
#   Made for ZetrexMC Application
# ==============================

menu_title: "&8[ &bProfile &8| &7%player_name% &8]"
menu_type: CHEST
menu_rows: 4
open_command: profile

items:
  background:
    material: GRAY_STAINED_GLASS_PANE
    slot: 0-35
    display_name: " "

  player_head:
    material: PLAYER_HEAD
    slot: 13
    display_name: "&b%player_name%"
    nbt: "{SkullOwner:\"%player_name%\"}"
    lore:
      - " "
      - "&7Rank: &e%vault_rank%"
      - "&7Balance: &a$%vault_eco_balance_fixed%"
      - "&7Level: &d%auraskills_power%"
      - "&7Location: &f%player_x%, %player_y%, %player_z%"
      - " "

  stats:
    material: BOOK
    slot: 20
    display_name: "&eStatistics"
    lore:
      - " "
      - "&7Play Time: &f%statistic_time_played%"
      - "&7Player Kills: &c%statistic_player_kills%"
      - "&7Deaths: &c%statistic_deaths%"
      - " "

  kits_btn:
    material: CHEST
    slot: 22
    display_name: "&aKits"
    lore:
      - " "
      - "&7Click to open the Kits menu"
      - " "
    left_click_commands:
      - "[openguimenu] kits_menu"

  shop_btn:
    material: GOLD_INGOT
    slot: 24
    display_name: "&6Shop"
    lore:
      - " "
      - "&7Click to open the Coin Shop"
      - " "
    left_click_commands:
      - "[openguimenu] coin_shop"

  close:
    material: BARRIER
    slot: 31
    display_name: "&cClose"
    left_click_commands:
      - "[close]"
