# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
#  脵聟脴陋脵聣 脵聤脵聫脴麓脴潞脵聨脵聭脵聞 脴搂脵聞脵聙 Workflow脴聼
# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
on:
  push:
    branches:
      - main
      - boss-update
      - 'feature/**'     # 脴拢脵聤 脵聛脴卤脴鹿 脵聤脴篓脴炉脴拢 脴篓脵聙 feature/
    paths:
      - 'src/**'         # 脵聛脵聜脴路 脴鹿脵聠脴炉 脴陋脴潞脵聤脵聤脴卤 脴搂脵聞脵聝脵聢脴炉
      - 'pom.xml'        # 脴拢脵聢 脵聟脵聞脵聛 脴搂脵聞脴篓脵聠脴搂脴隆
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'

# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
#  脵聟脴陋脴潞脵聤脴卤脴搂脴陋 脴鹿脴搂脵聟脴漏
# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
env:
  JAVA_VERSION: '17'
  ARTIFACT_NAME: AncientOverlord-1.0.0

# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
#  脴搂脵聞脵聙 Jobs
# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
jobs:

  build:
    name: Maven Build & Package
    runs-on: ubuntu-latest

    steps:

      # 芒聰聙芒聰聙 1. 脴搂脴鲁脴陋脵聠脴鲁脴搂脴庐 脴搂脵聞脵聝脵聢脴炉 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Checkout repository
        uses: actions/checkout@v4

      # 芒聰聙芒聰聙 2. 脴楼脴鹿脴炉脴搂脴炉 Java 17 (Temurin / Eclipse) 芒聰聙芒聰聙
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven          # 脴陋脴庐脴虏脵聤脵聠 脵聟脴陇脵聜脴陋 脵聞脵聙 ~/.m2 脵聞脴陋脴鲁脴卤脵聤脴鹿 脴搂脵聞脴篓脵聠脴搂脴隆

      # 芒聰聙芒聰聙 3. 脴搂脵聞脴陋脴颅脵聜脵聜 脵聟脵聠 脴楼脴碌脴炉脴搂脴卤 Maven 脵聢 Java 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Verify Java & Maven versions
        run: |
          java -version
          mvn -version

      # 芒聰聙芒聰聙 4. 脴篓脵聠脴搂脴隆 脴搂脵聞脵聙 jar (脴陋脴庐脴路脵聤 脴搂脵聞脵聙 tests 脵聞脴拢脵聠脵聡 Bukkit plugin) 芒聰聙芒聰聙
      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      # 芒聰聙芒聰聙 5. 脴搂脵聞脴陋脴颅脵聜脵聜 脵聟脵聠 脵聢脴卢脵聢脴炉 脴搂脵聞脵聙 jar 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Verify JAR was created
        run: |
          echo "=== Contents of target/ ==="
          ls -lh target/*.jar
          echo "芒聹聰 Build successful: $(ls target/*-shaded.jar 2>/dev/null || ls target/*.jar | head -1)"

      # 芒聰聙芒聰聙 6. 脴卤脵聛脴鹿 脴搂脵聞脵聙 jar 脵聝脵聙 Artifact 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      #    脵聤脵聟脵聝脵聠 脴陋脴颅脵聟脵聤脵聞脵聡 脵聟脵聠 脴碌脵聛脴颅脴漏 脴搂脵聞脵聙 Actions 脵聟脴篓脴搂脴麓脴卤脴漏
      - name: Upload plugin JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-jar
          path: target/*.jar
          retention-days: 14    # 脴搂脵聞脴搂脴颅脴陋脵聛脴搂脴赂 脴篓脴搂脵聞脵聙 artifact 脵聞脵聟脴炉脴漏 14 脵聤脵聢脵聟

  # 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
  #  Release 脴陋脵聞脵聜脴搂脴娄脵聤 脴鹿脵聠脴炉 脴鹿脵聟脵聞 push 脴鹿脵聞脵聣 main 脵聛脵聜脴路
  # 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build                # 脵聤脵聠脴陋脴赂脴卤 脵聠脴卢脴搂脴颅 job 脴搂脵聞脴篓脵聠脴搂脴隆 脴拢脵聢脵聞脴搂脵聥
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write           # 脵聟脴路脵聞脵聢脴篓 脵聞脴楼脵聠脴麓脴搂脴隆 Release

    steps:

      # 芒聰聙芒聰聙 1. 脴搂脴鲁脴陋脵聠脴鲁脴搂脴庐 脴搂脵聞脵聝脵聢脴炉 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Checkout repository
        uses: actions/checkout@v4

      # 芒聰聙芒聰聙 2. 脴楼脴鹿脴炉脴搂脴炉 Java 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # 芒聰聙芒聰聙 3. 脴楼脴鹿脴搂脴炉脴漏 脴搂脵聞脴篓脵聠脴搂脴隆 脵聞脵聞脵聙 Release 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      # 芒聰聙芒聰聙 4. 脴楼脵聠脴麓脴搂脴隆 Release 脵聟脴鹿 脴卤脵聛脴鹿 脴搂脵聞脵聙 jar 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AncientOverlord v${{ github.run_number }}"
          body: |
            ## AncientOverlord Plugin - Auto Release

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Build:** #${{ github.run_number }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Installation
            1. Place the JAR in your server's `plugins/` folder
            2. Copy `MythicMobs/Mobs/AncientOverlord.yml` 芒聠聮 `plugins/MythicMobs/Mobs/`
            3. Copy `MythicMobs/Skills/AncientOverlord_Skills.yml` 芒聠聮 `plugins/MythicMobs/Skills/`
            4. Restart server or run `/mm reload`
          files: target/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
